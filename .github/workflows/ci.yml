name: CI

on:
  push:
  pull_request:

jobs:
  version-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check version consistency
        run: |
          pkg_ver=$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")
          plugin_ver=$(node -p "JSON.parse(require('fs').readFileSync('openclaw.plugin.json','utf8')).version")
          if [ "$pkg_ver" != "$plugin_ver" ]; then
            echo "::error::Version mismatch: package.json=$pkg_ver, openclaw.plugin.json=$plugin_ver"
            exit 1
          fi
          echo "Versions match: $pkg_ver"

  cli-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run unit tests
        run: |
          cd packages/core
          # Exclude tests with hardcoded path assumptions that break in CI
          node --test $(ls test/*.test.mjs | grep -v workflow-fork-guards | grep -v cross-process-lock | grep -v cli-)
